runConfig:
  minInstances: 0
  maxInstances: 5
  concurrency: 80
  cpu: 4
  memoryMiB: 6144

env:
  - variable: NEXT_PUBLIC_APP_URL
    value: https://screentime.wojticore.pl
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_SUPABASE_URL
    secret: SCREEN_SUPABASE_URL
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
    secret: SCREEN_SUPABASE_PUBLISHABLE_KEY
    availability:
      - BUILD
      - RUNTIME

  - variable: SUPABASE_SECRET_KEY
    secret: SCREEN_SUPABASE_SECRET_KEY
    availability:
      - RUNTIME

  - variable: ADMIN_INVITE_REDIRECT_URL
    value: https://screentime.wojticore.pl/auth/callback?next=/admin/setup-password
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_RECOMMENDED_DAILY_LIMIT_MINUTES
    value: "120"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_SESSION_COOKIE_NAME
    value: st_session_id
    availability:
      - BUILD
      - RUNTIME